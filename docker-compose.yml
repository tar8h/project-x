services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: px-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - px

  kafka:
    image: apache/kafka:3.7.0
    container_name: px-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - px

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: px-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - px

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: px-kafka-init
    depends_on:
      - kafka
    entrypoint: >
      /bin/bash -c "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
        echo waiting for kafka;
        sleep 3;
      done;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_TOPIC_RAW:-sensor.raw} --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_TOPIC_FEATURES:-sensor.features} --partitions 3 --replication-factor 1;
      "
    networks:
      - px

  telegraf:
    image: telegraf:1.30
    container_name: px-telegraf
    depends_on:
      - mosquitto
      - kafka
    volumes:
      - ./infra/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - px

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: px-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maintenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintenance}
      POSTGRES_DB: ${POSTGRES_DB:-maintenance}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - px

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: px-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - px

  minio-init:
    image: minio/mc:latest
    container_name: px-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo waiting for minio;
        sleep 3;
      done;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-sensor-raw};
      mc mb --ignore-existing local/${MLFLOW_BUCKET:-mlflow};
      exit 0;
      "
    networks:
      - px

  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    container_name: px-mlflow
    depends_on:
      - minio
      - timescaledb
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-maintenance}:${POSTGRES_PASSWORD:-maintenance}@timescaledb:5432/${POSTGRES_DB:-maintenance}
      --default-artifact-root s3://${MLFLOW_BUCKET:-mlflow}/
      --host 0.0.0.0
    networks:
      - px

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: px-pgadmin
    profiles:
      - ui
    depends_on:
      - timescaledb
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - px

  flink-jobmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: px-flink-jobmanager
    profiles:
      - processing
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - px

  flink-taskmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: px-flink-taskmanager
    profiles:
      - processing
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - px

  spark-master:
    image: apache/spark:3.5.1
    container_name: px-spark-master
    profiles:
      - processing
    ports:
      - "7077:7077"
      - "8082:8080"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master"]
    networks:
      - px

  spark-worker:
    image: apache/spark:3.5.1
    container_name: px-spark-worker
    profiles:
      - processing
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    networks:
      - px

  dagster:
    build:
      context: .
      dockerfile: jobs/dagster/Dockerfile
    container_name: px-dagster
    profiles:
      - orchestration
    ports:
      - "3001:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - dagster-data:/opt/dagster/dagster_home
      - ./models:/app/models
    depends_on:
      - mlflow
      - minio-init
    networks:
      - px

  inference-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: px-inference-api
    ports:
      - "8080:8080"
    environment:
      MODEL_PATH: ${MODEL_PATH:-/models/isolation_forest.joblib}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-0.65}
    volumes:
      - ./models:/models
    networks:
      - px

  kafka-to-minio:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: px-kafka-to-minio
    depends_on:
      - kafka-init
      - minio-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC_RAW:-sensor.raw}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET_RAW:-sensor-raw}
    networks:
      - px

  kafka-to-timescale:
    build:
      context: .
      dockerfile: services/stream/Dockerfile
    container_name: px-kafka-to-timescale
    depends_on:
      - kafka-init
      - timescaledb
      - inference-api
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC_RAW:-sensor.raw}
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-maintenance}
      POSTGRES_USER: ${POSTGRES_USER:-maintenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintenance}
      INFERENCE_URL: http://inference-api:8080/predict
    networks:
      - px

  grafana:
    image: grafana/grafana:11.1.0
    container_name: px-grafana
    depends_on:
      - timescaledb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - px

  generator:
    build:
      context: .
      dockerfile: services/generator/Dockerfile
    container_name: px-generator
    profiles:
      - load
    depends_on:
      - mosquitto
    command: ["python", "sensor_generator.py", "--mqtt-host", "mosquitto", "--rate", "2"]
    networks:
      - px

networks:
  px:
    name: project-x

volumes:
  timescaledb-data:
  minio-data:
  grafana-data:
  pgadmin-data:
  dagster-data:
