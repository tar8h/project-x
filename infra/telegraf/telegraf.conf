[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ms"
  hostname = "edge-telegraf"
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["factory/+/+"]
  qos = 1
  connection_timeout = "30s"
  persistent_session = true
  client_id = "telegraf-edge-agent"
  data_format = "json"
  tag_keys = ["machine_id", "sensor_type", "site", "line"]
  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05.999999Z07:00"
  name_override = "sensor_reading"

[[outputs.kafka]]
  brokers = ["kafka:9092"]
  topic = "sensor.raw"
  routing_tag = "sensor_type"
  data_format = "json"
